services:
  db:
    image: postgres:16-alpine
    container_name: questlog-db
    environment:
      POSTGRES_USER: questlog
      POSTGRES_PASSWORD: questlog
      POSTGRES_DB: questlog
    ports:
      - "5432:5432"
    volumes:
      - questlog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questlog -d questlog"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: questlog-backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://questlog:questlog@db:5432/questlog
      OBSIDIAN_VAULT_PATH: /vault/docs_obsidian
      DAILY_RESET_TIMEZONE: Europe/Kyiv
    volumes:
      - ./docs_obsidian:/vault/docs_obsidian
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_API_URL: ""
    container_name: questlog-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
      API_URL: http://backend:8000
    restart: unless-stopped

volumes:
  questlog_pgdata:
